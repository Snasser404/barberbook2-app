services:
  - type: web
    name: barbershop-app
    runtime: node
    plan: starter   # $7/mo always-on. Use "free" for sleeping free tier (no disk).
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/shops
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:/var/data/prod.db
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disk:
      name: barbershop-data
      mountPath: /var/data
      sizeGB: 1
